[build]
  command = "npm ci && npm run build"
  publish = "dist"

[env]
  [env.production]
    NPM_CONFIG_PRODUCTION = "false"

[dev]
  command = "npm run dev"
  port = 3000

# Redirect all non-file routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
